<!DOCTYPE html>
<html>
<body>
    <p2>Contoh Perulangan For</p2>

    <p id="demo"></p>

    <script>
        var text="";
        var i;
        for (i = 0; i < 10; i++) {
            text += "Angka: " + i + "<br>";
        }
        document.getElementById("demo").innerHTML = text;
    </script>
</body>
</html>
