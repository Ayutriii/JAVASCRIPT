<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator Sederhana</title>
  </head>
  <body>
    <h1>Kalkulator Sederhana</h1>
    <p>Angka 1: <input type="number" id="angka1" /></p>
    <p>Angka 2: <input type="number" id="angka2" /></p>
    <p>Hasil: <input type="text" id="output" readonly /></p>
    <p>
      <button onclick="hitung('+')">+</button>
      <button onclick="hitung('-')">-</button>
      <button onclick="hitung('*')">x</button>
      <button onclick="hitung('/')">/</button>
    </p>

    <script>
      function hitung(operasi) {
        const nilai1 = parseFloat(document.getElementById("angka1").value);
        const nilai2 = parseFloat(document.getElementById("angka2").value);
        let hasil;

        switch (operasi) {
          case "+":
            hasil = nilai1 + nilai2;
            break;
          case "-":
            hasil = nilai1 - nilai2;
            break;
          case "*":
            hasil = nilai1 * nilai2;
            break;
          case "/":
            if (nilai2 === 0) {
              alert("Tidak dapat dibagi dengan nol");
              hasil = "tidak terdefinisi";
            } else {
              hasil = nilai1 / nilai2;
            }
            break;
          default:
            hasil = "Operasi tidak valid";
        }

        document.getElementById("output").value = hasil;
      }
    </script>
  </body>
</html>
