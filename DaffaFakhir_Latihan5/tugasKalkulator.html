<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator</title>
</head>
<body>
    <script>
        function tambah(){
            var nilai1 = parseInt(document.kirim.nilai1.value);
            var nilai2 = parseInt(document.kirim.nilai2.value);
            var hasil = nilai1 + nilai2;
            document.kirim.H.value = hasil;
        }
        function kurang(){
            var nilai1 = parseInt(document.kirim.nilai1.value);
            var nilai2 = parseInt(document.kirim.nilai2.value);
            var hasil = nilai1 - nilai2;
            document.kirim.H.value = hasil;
        }
        function kali(){
            var nilai1 = parseInt(document.kirim.nilai1.value);
            var nilai2 = parseInt(document.kirim.nilai2.value);
            var hasil = nilai1 * nilai2;
            document.kirim.H.value = hasil;
        }
        function bagi(){
            var nilai1 = parseInt(document.kirim.nilai1.value);
            var nilai2 = parseInt(document.kirim.nilai2.value);
            var hasil = nilai1 / nilai2;
            document.kirim.H.value = hasil;
        }
    </script>

    <form method="POST" name="kirim">
        <p>Bilangan 1 = <input type="text" name="nilai1" size="20"></p>
        <p>Bilangan 2 = <input type="text" name="nilai2" size="20"></p>
        <p>Hasil = <input type="text" name="H" size="20"></p>
        <p><input type="button" value="+" onclick="tambah()">
        <input type="button" value="-" onclick="kurang()">
        <input type="button" value="X" onclick="kali()">
        <input type="button" value="/" onclick="bagi()"></p>
    </form>
</body>
</html>
