<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konversi Nilai Angka ke Nilai Huruf</title>
    <script>
        function konversiNilai() {
            let nilaiAngka = parseInt(document.getElementById("nilaiAngka").value);
            let nilaiHuruf;

            if (isNaN(nilaiAngka) || nilaiAngka < 0 || nilaiAngka > 100) {
                alert("Masukkan nilai angka antara 0 - 100.");
                document.getElementById("nilaiHuruf").value = "";
                return;
            }

            if (nilaiAngka <= 40) {
                nilaiHuruf = "E";
            } else if (nilaiAngka <= 55) {
                nilaiHuruf = "D";
            } else if (nilaiAngka <= 60) {
                nilaiHuruf = "C";
            } else if (nilaiAngka <= 65) {
                nilaiHuruf = "BC";
            } else if (nilaiAngka <= 70) {
                nilaiHuruf = "B";
            } else if (nilaiAngka <= 80) {
                nilaiHuruf = "AB";
            } else {
                nilaiHuruf = "A";
            }

            document.getElementById("nilaiHuruf").value = nilaiHuruf;
        }
    </script>
</head>
<body>
    <h1>Konversi Nilai Angka ke Nilai Huruf</h1>
    <form>
        <label for="nilaiAngka">Masukkan Nilai Angka (0-100):</label>
        <input type="text" id="nilaiAngka" size="10">
        <input type="button" value="Konversi" onclick="konversiNilai()">
        <br><br>
        <label for="nilaiHuruf">Nilai Huruf:</label>
        <input type="text" id="nilaiHuruf" size="10" readonly>
    </form>
</body>
</html>
