<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konversi Nilai Angka ke Huruf</title>
</head>
    <script>
        function convertGrade() {
            var nilai = document.getElementById("nilai").value;
            var grade;

            if (nilai >= 0 && nilai <= 40) {
                grade = "E";
            } else if (nilai >= 41 && nilai <= 55) {
                grade = "D";
            } else if (nilai >= 56 && nilai <= 60) {
                grade = "C";
            } else if (nilai >= 61 && nilai <= 65) {
                grade = "BC";
            } else if (nilai >= 66 && nilai <= 70) {
                grade = "B";
            } else if (nilai >= 71 && nilai <= 80) {
                grade = "AB";
            } else if (nilai >= 81 && nilai <= 100) {
                grade = "A";
            } else {
                grade = "Nilai tidak valid";
            }

            document.getElementById("hasil").innerHTML = "Nilai huruf: " + grade;
        }
    </script>
<body>
    <h1>Konversi Nilai Angka ke Huruf</h1>
    <label for="nilai">Masukkan nilai (0-100):</label>
    <input type="number" id="nilai" min="0" max="100">
    <button onclick="convertGrade()">Konversi</button>
    <p id="hasil"></p>
</body>
</html>
