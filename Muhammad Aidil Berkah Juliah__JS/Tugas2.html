<!DOCTYPE html>
<html>
  <head>
    <title>Kalkulator Sederhana</title>
  </head>
  <body>
    <h1>Kalkulator Sederhana</h1>
    <p>Bil 1 <input type="text" id="bil1" name="bil1" /></p>
    <p>Bil 2 <input type="text" id="bil2" name="bil2" /></p>
    <p>Hasil <input type="text" id="hasil" name="hasil" /></p>
    <p>
      <input type="button" value="+" onclick="tambah()" />
      <input type="button" value="-" onclick="kurang()" />
      <input type="button" value="x" onclick="kali()" />
      <input type="button" value="/" onclick="bagi()" />
    </p>

    <script>
      function tambah() {
        var bil1 = parseFloat(document.getElementById("bil1").value);
        var bil2 = parseFloat(document.getElementById("bil2").value);
        document.getElementById("hasil").value = bil1 + bil2;
      }
      function kurang() {
        var bil1 = parseFloat(document.getElementById("bil1").value);
        var bil2 = parseFloat(document.getElementById("bil2").value);
        document.getElementById("hasil").value = bil1 - bil2;
      }
      function kali() {
        var bil1 = parseFloat(document.getElementById("bil1").value);
        var bil2 = parseFloat(document.getElementById("bil2").value);
        document.getElementById("hasil").value = bil1 * bil2;
      }
      function bagi() {
        var bil1 = parseFloat(document.getElementById("bil1").value);
        var bil2 = parseFloat(document.getElementById("bil2").value);
        if (bil2 == 0) {
          document.getElementById("hasil").value = "tidak terdefinisi";
          alert("Tidak dapat dibagi dengan nol");
        } else {
          document.getElementById("hasil").value = bil1 / bil2;
        }
      }
    </script>
  </body>
</html>
