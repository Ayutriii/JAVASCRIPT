<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 1</title>
</head>
<body>
    <h2>Tugas Mengonversi Nilai Angka Menjadi Nilai Huruf</h2>

    <p>
        Input Nilai Angka: <input type="text" id="nilai" name="nilai" />
        <button onclick="konversi()">KONVERSI</button>
    </p>

    <p id="result"></p>

    <script>
        function konversi() {
            var nilai = document.getElementById("nilai").value;
            var result;

            if (nilai >= 0 && nilai <= 40) {
                result = "E";
            }
            else if (nilai >= 41 && nilai <= 55) {
                result = "D";
            }
            else if (nilai >= 56 && nilai <= 60) {
                result = "C";
            }
            else if (nilai >= 61 && nilai <= 65) {
                result = "BC";
            }
            else if (nilai >= 66 && nilai <= 70) {
                result = "B";
            }
            else if (nilai >= 71 && nilai <= 80) {
                result = "AB";
            }
            else if (nilai >= 81 && nilai <= 100) {
                result = "A";
            }
            else{
                alert("Nilai tidak valid!");
                result = "";
            }
            document.getElementById("result").innerHTML = "Nilai Huruf: " + result;
        }
    </script>
</body>
</html>
