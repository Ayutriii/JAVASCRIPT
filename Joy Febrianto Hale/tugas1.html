<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konversi Nilai Angka ke Huruf</title>
    <script>
        function konversiNilai() {
            var angka = document.getElementById("nilaiAngka").value;
            var nilaiHuruf = "";

            if (angka >= 0 && angka <= 40) {
                nilaiHuruf = "E";
            } else if (angka >= 41 && angka <= 55) {
                nilaiHuruf = "D";
            } else if (angka >= 56 && angka <= 60) {
                nilaiHuruf = "C";
            } else if (angka >= 61 && angka <= 65) {
                nilaiHuruf = "BC";
            } else if (angka >= 66 && angka <= 70) {
                nilaiHuruf = "B";
            } else if (angka >= 71 && angka <= 80) {
                nilaiHuruf = "AB";
            } else if (angka >= 81 && angka <= 100) {
                nilaiHuruf = "A";
            } else {
                nilaiHuruf = "Nilai tidak valid";
            }
            document.getElementById("hasil").innerHTML = "Nilai huruf: " + nilaiHuruf;
        }
    </script>
</head>
<body>

    <h2>Konversi Nilai Angka ke Huruf</h2>
    <label for="nilaiAngka">Masukkan Nilai Angka (0-100):</label>
    <input type="number" id="nilaiAngka" min="0" max="100">
    <button onclick="konversiNilai()">Konversi</button>

    <p id="hasil"></p>

</body>
</html>
