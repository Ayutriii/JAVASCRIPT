<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>
    <script>
        function tambah() {
            var bil1 = parseFloat(document.getElementById("bil1").value);
            var bil2 = parseFloat(document.getElementById("bil2").value);
            var hasil = bil1 + bil2;
            document.getElementById("hasil").value = hasil;
        }

        function kurang() {
            var bil1 = parseFloat(document.getElementById("bil1").value);
            var bil2 = parseFloat(document.getElementById("bil2").value);
            var hasil = bil1 - bil2;
            document.getElementById("hasil").value = hasil;
        }

        function kali() {
            var bil1 = parseFloat(document.getElementById("bil1").value);
            var bil2 = parseFloat(document.getElementById("bil2").value);
            var hasil = bil1 * bil2;
            document.getElementById("hasil").value = hasil;
        }

        function bagi() {
            var bil1 = parseFloat(document.getElementById("bil1").value);
            var bil2 = parseFloat(document.getElementById("bil2").value);
            if (bil2 != 0) {
                var hasil = bil1 / bil2;
                document.getElementById("hasil").value = hasil;
            } else {
                document.getElementById("hasil").value = "Error (divisi dengan 0)";
            }
        }
    </script>
</head>
<body>

    <h2>Kalkulator Sederhana</h2>

    <label for="bil1">Bil 1:</label>
    <input type="number" id="bil1" placeholder="Masukkan bilangan pertama"><br><br>

    <label for="bil2">Bil 2:</label>
    <input type="number" id="bil2" placeholder="Masukkan bilangan kedua"><br><br>

    <label for="hasil">Hasil:</label>
    <input type="text" id="hasil" readonly><br><br>

    <button onclick="tambah()">+</button>
    <button onclick="kurang()">-</button>
    <button onclick="kali()">x</button>
    <button onclick="bagi()">/</button>

</body>
</html>
