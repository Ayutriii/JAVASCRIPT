<!DOCTYPE html>
<html>
    <body>
        <h2>Contoh perulangan For</h2>
        <p id="demo"></p>

        <script>
            var text="";
            var i;
            for (i=0; + i<10; i++){
                text += "angka"+i+ "<br>";
            }
            document.getElementById("demo").innerHTML=text;
        </script>
    </body>
</html>
