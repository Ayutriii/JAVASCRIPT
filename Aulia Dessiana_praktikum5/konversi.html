<!DOCTYPE html>
<html>
<head>
    <title>Konversi</title>
</head>
<body>
    <h1>Konversi Nilai</h1>

    <label for="inputNilai">Masukkan Nilai:</label>
    <input type="number" id="inputNilai">
    <button onclick="ubahNilai()">Konversi</button> <br><br>

    <p id="output"></p>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilai</title>
</head>
<body>
    <script>
        function konversi(){
            var nilai = parseInt(document.kirim.nilai.value);;
            if(nilai>=81){
                document.kirim.H.value = "A";
            }else if(nilai>=71){
                document.kirim.H.value = "AB";
            }else if(nilai>=66){
                document.kirim.H.value = "B";
            }else if(nilai>=61){
                document.kirim.H.value = "BC";
            }else if(nilai>=56){
                document.kirim.H.value = "C";
            }else if(nilai>=41){
                document.kirim.H.value = "D";
            }else if(nilai>=0){
                document.kirim.H.value = "E";
            }else{
                document.kirim.H.value = "Nilai Error";
            }
        }
    </script>

    <form method="POST" name="kirim">
        <p>Masukkan nilai = <input type="text" name="nilai" size="20"></p>
        <p>Hasil Konversi = <input type="text" name="H" size="20"></p>
        <p><input type="button" value="CONVERT" name="B1" onclick="konversi()"></p>
    </form>
</body>
</html>
<script>
function ubahNilai() {
  let nilai = parseInt(document.getElementById("inputNilai").value);
  let grade = 
    nilai >= 81 && nilai <= 100 ? "A" :
    nilai >= 71 && nilai <= 80 ? "AB" :
    nilai >= 66 && nilai <= 70 ? "B" :
    nilai >= 61 && nilai <= 65 ? "BC" :
    nilai >= 56 && nilai <= 60 ? "C" :
    nilai >= 41 && nilai <= 55 ? "D" :
    nilai >= 0 && nilai <= 40 ? "E" :
    "Rentang Nilai hanya sampai 100";

  document.getElementById("output").innerHTML = "Hasil Konversi: " + grade;
}
</script>
</body>
</html>
