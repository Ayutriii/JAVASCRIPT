<!DOCTYPE html>
<html>
    <head>
    <title>Konversi Angka ke Huruf</title>
</head>
<body>
    <h1>Konversi Angka ke Huruf</h1>
    <p>Masukkan angka:</p>
    <input type="text" id="angka" />
    <button onclick="konversi()">Konversi</button>
    <p>Hasil: <span id="hasil"></span></p>

<script>
    function konversi() {
    var angka = parseInt(document.getElementById("angka").value);
    var hasil = "";
    if (angka >= 0 && angka <= 40) {
    hasil = "E";
  } else if (angka >= 41 && angka <= 55) {
    hasil = "D";
  } else if (angka >= 56 && angka <= 60) {
    hasil = "C";
  } else if (angka >= 61 && angka <= 65) {
    hasil = "BC";
  } else if (angka >= 66 && angka <= 70) {
    hasil = "B";
  } else if (angka >= 71 && angka <= 80) {
    hasil = "AB";
  } else if (angka >= 81 && angka <= 100) {
    hasil = "A";
  } else {
    hasil = "Angka tidak valid";
  }
  document.getElementById("hasil").innerHTML = hasil;
}
</script>
</body>
</html>
