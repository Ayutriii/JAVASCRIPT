<!DOCTYPE html>
<html>
<head>
  <title>Kalkulator Sederhana</title>
</head>
<body>
  <h1>Kalkulator Sederhana</h1>
  <label for="bil1">Bilangan 1:</label>
  <input type="text" id="bil1"><br><br>

  <label for="bil2">Bilangan 2:</label>
  <input type="text" id="bil2"><br><br>

  <label for="hasil">Hasil:</label>
  <input type="text" id="hasil" readonly><br><br>

  <button onclick="tambah()">+</button>
  <button onclick="kurang()">-</button>
  <button onclick="kali()">x</button>
  <button onclick="bagi()">/</button>

  <script>
    function tambah() {
      let bil1 = parseFloat(document.getElementById("bil1").value);
      let bil2 = parseFloat(document.getElementById("bil2").value);
      document.getElementById("hasil").value = bil1 + bil2;
    }

    function kurang() {
      let bil1 = parseFloat(document.getElementById("bil1").value);
      let bil2 = parseFloat(document.getElementById("bil2").value);
      document.getElementById("hasil").value = bil1 - bil2;
    }

    function kali() {
      let bil1 = parseFloat(document.getElementById("bil1").value);
      let bil2 = parseFloat(document.getElementById("bil2").value);
      document.getElementById("hasil").value = bil1 * bil2;
    }

    function bagi() {
      let bil1 = parseFloat(document.getElementById("bil1").value);
      let bil2 = parseFloat(document.getElementById("bil2").value);
      if (bil2 === 0) {
        document.getElementById("hasil").value = "Tidak dapat dibagi nol";
      } else {
        document.getElementById("hasil").value = bil1 / bil2;
      }
    }
  </script>
</body>
</html>
