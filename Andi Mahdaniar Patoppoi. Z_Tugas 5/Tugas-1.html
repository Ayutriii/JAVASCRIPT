<!DOCTYPE html>
<html>
<head>
  <title>Konversi Nilai Angka ke Huruf</title>
</head>
<body>
  <h1>Konversi Nilai Angka ke Huruf</h1>
  <p>
    Masukkan Nilai Angka: <input type="number" id="nilai" />
    <button onclick="konversi()">Konversi</button>
  </p>
  <p id="hasil"></p>

  <script>
    function konversi() {
      const nilai = parseInt(document.getElementById("nilai").value);
      const grade = nilai >= 81 ? "A" :
                    nilai >= 71 ? "AB" :
                    nilai >= 66 ? "B" :
                    nilai >= 61 ? "BC" :
                    nilai >= 56 ? "C" :
                    nilai >= 41 ? "D" :
                    nilai >= 0  ? "E" : "Nilai tidak valid!";
      document.getElementById("hasil").textContent = "Nilai Huruf: " + grade;
    }
  </script>
</body>
</html>
