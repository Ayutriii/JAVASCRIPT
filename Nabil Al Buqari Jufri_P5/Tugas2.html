<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>
    <style>
        input[type="number"], input[type="text"] {
            display: block;
            margin-bottom: 10px;
            width: 200px;
            padding: 5px;
        }
        button {
            width: 50px;
            height: 50px;
            font-size: 20px;
            margin-right: 5px;
        }
    </style>
    <script>
        function hitung(operasi) {
            var bil1 = parseFloat(document.getElementById("bil1").value);
            var bil2 = parseFloat(document.getElementById("bil2").value);
            var hasil = 0;
            if (isNaN(bil1) || isNaN(bil2)) {
                document.getElementById("hasil").value = "Input tidak valid";
                return;}
            switch (operasi) {
                case '+':
                    hasil = bil1 + bil2;
                    break;
                case '-':
                    hasil = bil1 - bil2;
                    break;
                case '*':
                    hasil = bil1 * bil2;
                    break;
                case '/':
                    if (bil2 === 0) {
                        document.getElementById("hasil").value = "Tidak dapat dibagi dengan 0";
                        return;
                    }
                    hasil = bil1 / bil2;
                    break;
                default:
                    hasil = "Operasi tidak valid";
            }
            document.getElementById("hasil").value = hasil;
        }
    </script>
</head>
<body>
    <h1>Kalkulator Sederhana</h1>
    <label for="bil1">Bil 1:</label>
    <input type="number" id="bil1">
    <label for="bil2">Bil 2:</label>
    <input type="number" id="bil2">
    <label for="hasil">Hasil:</label>
    <input type="text" id="hasil" readonly>
    <br>
    <button onclick="hitung('+')">+</button>
    <button onclick="hitung('-')">-</button>
    <button onclick="hitung('*')">X</button>
    <button onclick="hitung('/')">/</button>
</body>
</html>
