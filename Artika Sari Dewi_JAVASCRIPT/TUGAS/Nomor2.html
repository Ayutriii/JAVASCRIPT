<!DOCTYPE html>
<html>
    <head>
    <script language="javascript">
        function calculate(operation){
            var val1 = parseInt(document.kirim.T1.value);
            var val2 = parseInt(document.kirim.T2.value);
            var hasil;

            if (operation === 'Penjumlahan'){
                hasil = val1 + val2;
                document.kirim.T3.value = "Hasilnya : "+ hasil;
            }else if (operation === 'Pengurangan'){
                hasil = val1 - val2;
                document.kirim.T3.value = "Hasilnya : "+ hasil;
            }else if (operation === 'Perkalian'){
                hasil = val1 * val2;
                document.kirim.T3.value = "Hasilnya : "+ hasil;
            }else if (operation === 'Pembagian'){
                if (val2 !== 0){
                    hasil = val1 / val2;
                document.kirim.T3.value = "Hasilnya : "+ hasil;
                }else{
                    document.kirim.T3.value = "Tidak Dapat Dibagi";
                }
            }
        }
          
    </script>
    </head>
    <body>
        <form method="POST" name="kirim">
            <p>BIL 1<input type="text" name="T1" size="20"> </p>
            <p>BIL 2 <input type="text" name="T2" size="20"></p>
            <p>Hasil <input type="text" name="T3" size="20"></p>
            <p><input type="button" value="+" name="B1" onclick="calculate('Penjumlahan')">
            <input type="button" value="-" name="B1" onclick="calculate('Pengurangan')">
            <input type="button" value="X" name="B1" onclick="calculate('Perkalian')">
            <input type="button" value="/" name="B1" onclick="calculate('Pembagian')"></p>
        </form>
    </body>
</html>
