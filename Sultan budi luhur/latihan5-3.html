<!DOCTYPE html>
<html lang="en">

<body>
    
    <h2>Contoh variable</h2>
    <p>Jika x = 10 dan y = 12</p>
    <p>Berapa hasil dari x + y?</p>
    
    <p id="demo"></p>
    <script>
        var x = 10;
        var y = 12;
        var hasil = x + y;
        document.getElementById("demo").innerHTML = 
            "Jawaban hasil dari x + y adalah: " + hasil;
    </script>
    
    </body>
    </html>
