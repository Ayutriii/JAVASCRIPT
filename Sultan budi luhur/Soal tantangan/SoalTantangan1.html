<!DOCTYPE html>
<html lang="en">
<head>
    <title>Soal tantangan 1</title>
    <script lang="JavaScript">
    function konvert() {
        var angka = parseInt(document.kirim.T1.value);
        
        // Validasi input
        if (isNaN(angka)) {
            document.kirim.T2.value = "Invalid input";
            return;
        }

        if (angka <= 40) {
            document.kirim.T2.value = "E";
        } else if (angka <= 55) {
            document.kirim.T2.value = "D";
        } else if (angka <= 60) {
            document.kirim.T2.value = "C";
        } else if (angka <= 65) {
            document.kirim.T2.value = "BC";
        } else if (angka <= 70) {
            document.kirim.T2.value = "B";
        } else if (angka <= 80) {
            document.kirim.T2.value = "AB";
        } else if (angka <= 100) {
            document.kirim.T2.value = "A";
        } else {
            document.kirim.T2.value = "Invalid";
        }
    }
    </script>
</head>
<body>
    <form method="post" name="kirim">
        <p>nilai<input type="text" name="T1" size="20"> Konversi ke angka
                <input type="text" name="T2" size="20">
        </p>
        <p><input type="button" value="Konversi" name="b1" onclick="konvert()"></p>
    </form>
</body>
</html>
