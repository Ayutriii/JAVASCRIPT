<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator</title>
    <script>
        function hitung(operasi) {
            var bil1 = parseFloat(document.getElementById("bil1").value);
            var bil2 = parseFloat(document.getElementById("bil2").value);
            var hasil = 0;
            if (isNaN(bil1) || isNaN(bil2)) {
                document.getElementById("hasil").value = "Input tidak valid";
                return;
            }
            if (operasi === "+") {
                hasil = bil1 + bil2;
            } else if (operasi === "-") {
                hasil = bil1 - bil2;
            } else if (operasi === "*") {
                hasil = bil1 * bil2;
            } else if (operasi === "/") {
                if (bil2 === 0) {
                    document.getElementById("hasil").value = "Tidak bisa dibagi nol";
                    return;
                }
                hasil = bil1 / bil2;
            }
            document.getElementById("hasil").value = hasil;
        }
    </script>
</head>
<body>
    <h3>Kalkulator</h3>
    <label for="bil1">Bil 1: </label>
    <input type="number" id="bil1"><br><br>

    <label for="bil2">Bil 2: </label>
    <input type="number" id="bil2"><br><br>

    <button onclick="hitung('+')">+</button>
    <button onclick="hitung('-')">-</button>
    <button onclick="hitung('*')">x</button>
    <button onclick="hitung('/')">/</button><br><br>

    <label for="hasil">Hasil Perhitungan: </label>
    <input type="text" id="hasil" readonly><br><br>
</body>
</html>
