<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>
    <style>
        input {
            margin: 5px;
        }
        button {
            margin: 5px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h2>Kalkulator Sederhana</h2>
    <label for="bil1">Bil 1</label>
    <input type="number" id="bil1"><br>
    <label for="bil2">Bil 2</label>
    <input type="number" id="bil2"><br>
    <label for="hasil">Hasil</label>
    <input type="text" id="hasil" readonly><br><br>
    <button onclick="hitung('+')">+</button>
    <button onclick="hitung('-')">-</button>
    <button onclick="hitung('*')">x</button>
    <button onclick="hitung('/')">/</button>
    <script>
        function hitung(operator) {
            var bil1 = parseFloat(document.getElementById('bil1').value);
            var bil2 = parseFloat(document.getElementById('bil2').value);
            var hasil = 0;

            if (isNaN(bil1) || isNaN(bil2)) {
                alert("Masukkan angka yang valid pada kedua bilangan.");
                return;
            }
            switch (operator) {
                case '+':
                    hasil = bil1 + bil2;
                    break;
                case '-':
                    hasil = bil1 - bil2;
                    break;
                case '*':
                    hasil = bil1 * bil2;
                    break;
                case '/':
                    if (bil2 === 0) {
                        alert("Tidak dapat membagi dengan nol.");
                        return;
                    }
                    hasil = bil1 / bil2;
                    break;
            }
            document.getElementById('hasil').value = hasil;
        }
    </script>
</body>
</html>
