<!DOCTYPE html>
<html lang="en">
    <body> 
        <h2> Contoh variabel</h2>
        <p> jika x=10 dan y=12</p>
        <P> Berapa hasil dari x + y ?</P>
        <p id="demo"></p>
        <script language = "javaScript">
            var x = 10;
            var y = 12;
            var hasil=x+y;
            document.getElementById("demo").innerHTML="jawaban hasil dari x = y adalah : " + hasil;
        </script>
    </body>
</html>
