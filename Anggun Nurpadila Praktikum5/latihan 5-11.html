<html>
    <head>
        <script language="javaScript">
            function test(){
                var val1 = parseInt(document.kirim.T1.value);
                if (!isNaN(val1)) {
                    if (val1 % 2 == 0)
                    document.kirim.T2.value = "bilangan genap";
                    else
                    document.kirim.T2.value = "bilangan genjil";  
                }else{
                    alert("Masukkan bilangan bulat yang valid.");
                }
            }
        </script>
    </head>
    <body>
        <form method="POST" name="kirim">
            <p>BIL <input type="text" name="T1" size="20"> MERUPAKAN BIL
                    <input type="text" name="T2" size="20"</p> 
                    <P><input type="button" value="TEBAK" name="B1" onclick="test()"
                    </P>
                </form>
    </body>
</html>
