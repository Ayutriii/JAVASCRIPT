<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konversi Nilai</title>
    <script>
        function konversiNilai() {
            var nilai = document.getElementById("nilaiInput").value;
            var hasil = "";
            if (nilai >= 0 && nilai <= 40) {
                hasil = "E";
            } else if (nilai >= 41 && nilai <= 55) {
                hasil = "D";
            } else if (nilai >= 56 && nilai <= 60) {
                hasil = "C";
            } else if (nilai >= 61 && nilai <= 65) {
                hasil = "BC";
            } else if (nilai >= 66 && nilai <= 70) {
                hasil = "B";
            } else if (nilai >= 71 && nilai <= 80) {
                hasil = "AB";
            } else if (nilai >= 81 && nilai <= 100) {
                hasil = "A";
            } else {
                hasil = "Nilai tidak valid";
            }
            document.getElementById("hasilKonversi").innerHTML = "Nilai huruf: " + hasil;
        }
    </script>
</head>
<body>
    <h2>Konversi Nilai Angka ke Nilai Huruf</h2>
    <label for="nilaiInput">Masukkan Nilai (0-100):</label>
    <input type="number" id="nilaiInput" min="0" max="100">
    <button onclick="konversiNilai()">Konversi</button>

    <p id="hasilKonversi"></p>
</body>
</html>
